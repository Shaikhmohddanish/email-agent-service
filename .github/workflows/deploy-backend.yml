name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # Pull latest code from GitHub
            if [ -d /opt/email-agent/repo ]; then
              cd /opt/email-agent/repo
              git pull origin main
            else
              git clone https://github.com/Shaikhmohddanish/email-agent-service.git /opt/email-agent/repo
            fi

            # Build Docker image (multi-stage: frontend + backend)
            cd /opt/email-agent/repo
            docker build -t email-agent-api:latest .

            # Stop and remove old container
            docker stop email-agent-api 2>/dev/null || true
            docker rm email-agent-api 2>/dev/null || true

            # Start new container
            docker run -d \
              --name email-agent-api \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /opt/email-agent/.env \
              -v /opt/email-agent/backend/credentials.json:/app/credentials.json \
              -v /opt/email-agent/backend/token.json:/app/token.json \
              email-agent-api:latest

            # Clean up dangling images
            docker image prune -f

            echo "Deployment complete!"
