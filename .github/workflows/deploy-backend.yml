name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Login to DO Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build and Push Docker image
        run: |
          docker build -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/email-agent-api:latest ./backend
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/email-agent-api:latest

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            # Login to registry using doctl-style API token auth
            echo ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} | docker login registry.digitalocean.com -u ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} --password-stdin

            # Pull latest image
            docker pull registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/email-agent-api:latest

            # Stop and remove old container
            docker stop email-agent-api 2>/dev/null || true
            docker rm email-agent-api 2>/dev/null || true

            # Start new container
            docker run -d \
              --name email-agent-api \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /opt/email-agent/.env \
              -v /opt/email-agent/backend/credentials.json:/app/credentials.json \
              -v /opt/email-agent/backend/token.json:/app/token.json \
              registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/email-agent-api:latest

            # Clean up old local images
            docker image prune -f

      - name: Garbage collect old images from registry
        run: |
          doctl registry garbage-collection start --include-untagged-manifests --force
